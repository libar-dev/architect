schema_version: 1
name: beautiful-mermaid
purpose: Render Mermaid diagrams to SVG and PNG assets using Beautiful Mermaid.
triggers:
  - User asks to render or convert Mermaid diagrams into images.
  - User needs SVG/PNG outputs for docs, slides, or diagrams.
inputs:
  - name: mermaid_source
    type: string
    description: Mermaid code or a path to a .mmd file.
  - name: output_basename
    type: string
    description: Output file base name (without extension).
  - name: theme
    type: string
    description: 'Mermaid theme name (default: default).'
  - name: png_requested
    type: boolean
    description: Whether PNG capture is required.
outputs:
  - name: svg_path
    type: string
    description: Path to the rendered SVG file.
  - name: png_path
    type: string
    description: Path to the PNG file (if requested).
  - name: notes
    type: string
    description: Theme selection and any constraints applied.
non_goals:
  - Rendering non-Mermaid diagram languages.
  - Auto-installing dependencies without approval.
risks:
  - Diagrams may include sensitive data if not redacted.
  - PNG capture requires agent-browser availability.
