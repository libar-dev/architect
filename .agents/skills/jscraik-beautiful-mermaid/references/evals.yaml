schema_version: 1
cases:
  - name: render-mermaid-code
    prompt: 'Render this Mermaid diagram to SVG and PNG with the tokyo-night theme: graph TD; A-->B'
    acceptance:
      - 'Mentions SVG and PNG outputs.'
      - 'Uses tokyo-night theme or default if not available.'
      - 'Includes render and capture steps.'
  - name: description-to-diagram
    prompt: 'Create a Mermaid flowchart from this description and render it: User logs in, system validates, then redirects.'
    acceptance:
      - 'Generates Mermaid syntax before rendering.'
      - 'Produces SVG output and notes PNG capture.'
  - name: non-mermaid-request
    prompt: 'Convert this PlantUML to a PNG diagram.'
    acceptance:
      - 'Explains that the skill is for Mermaid only.'
      - 'Asks for Mermaid input or offers to translate.'
